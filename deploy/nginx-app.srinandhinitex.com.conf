# HTTPS — app.srinandhinitex.com
# Install: sudo cp deploy/nginx-app.srinandhinitex.com.conf /etc/nginx/sites-available/snt-app
#          sudo ln -sf /etc/nginx/sites-available/snt-app /etc/nginx/sites-enabled/snt-app
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL paths from certbot (adjust if your cert path differs):
#   sudo certbot certonly --nginx -d app.srinandhinitex.com

server {
    listen 80;
    server_name app.srinandhinitex.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.srinandhinitex.com;

    ssl_certificate     /etc/letsencrypt/live/app.srinandhinitex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.srinandhinitex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow AI listing photo uploads (default nginx limit is 1MB → 413)
    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy everything to Node — serves API + client/dist (avoids nginx root permission issues)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
